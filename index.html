<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <script src="js/practies.js" defer></script>
</head>
<body>
    <div id="calculator">
        <div class="field">0</div>
        <div class="buttons">
            <button class="button button-action">C</button>
            <button class="button button-action">+/-</button>
            <button class="button button-action">%</button>
            <button class="button button-action">÷</button>
            <button class="button button-num">7</button>
            <button class="button button-num">8</button>
            <button class="button button-num">9</button>
            <button class="button button-action">×</button>
            <button class="button button-num">4</button>
            <button class="button button-num">5</button>
            <button class="button button-num">6</button>
            <button class="button button-action">-</button>
            <button class="button button-num">1</button>
            <button class="button button-num">2</button>
            <button class="button button-num">3</button>
            <button class="button button-action">+</button>
            <button class="button button-num">0</button>
            <button class="button button-num">,</button>
            <button class="button button-action">=</button>
        </div>
    </div>
    
</body>
</html>
